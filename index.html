<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik XAUUSD dengan Google Analytics</title>

    <!-- Google tag (gtag.js) - Script Google Analytics Anda -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WWR1LJ4LHW"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      // Menghubungkan ke ID Anda
      gtag('config', 'G-WWR1LJ4LHW');
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .chart-container {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>Grafik Live XAUUSD (Emas)</h2>

    <div class="chart-container">
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container">
          <div id="tradingview_chart"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget(
          {
          "width": 980,
          "height": 610,
          "symbol": "OANDA:XAUUSD", /* Simbol sudah diubah ke XAUUSD dari broker OANDA */
          "interval": "60", /* 60 untuk grafik 1 Jam (1 Hour) */
          "timezone": "Asia/Jakarta",
          "theme": "dark", /* Saya ubah ke mode gelap (dark) agar lebih nyaman dilihat, bisa diganti "light" */
          "style": "1", /* 1 = Gaya grafik Candlestick */
          "locale": "id",
          "enable_publishing": false,
          "container_id": "tradingview_chart"
        }
          );
          </script>
        </div>
        <!-- TradingView Widget END -->
    </div>

</body>
</html>

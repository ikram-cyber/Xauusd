<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafik XAUUSD dengan Google Analytics</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WWR1LJ4LHW"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-WWR1LJ4LHW');
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px; /* Padding diperkecil agar tidak makan tempat di layar HP */
            background-color: #f4f4f9;
        }
        h2 {
            text-align: center;
            color: #333;
            font-size: 1.5rem; /* Menyesuaikan ukuran judul agar proporsional di HP */
        }
        .chart-container {
            width: 100%;
            height: 75vh; /* Grafik mengambil 75% dari tinggi layar perangkat */
            max-width: 1200px; /* Batas maksimal lebar jika dibuka di monitor besar */
            margin: 10px auto; /* Membuat posisi persis di tengah */
        }
    </style>
</head>
<body>

    <h2>Grafik Live XAUUSD (Emas)</h2>

    <div class="chart-container">
        <div class="tradingview-widget-container" style="height:100%;width:100%">
          <div id="tradingview_chart" style="height:100%;width:100%"></div>
          <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
          <script type="text/javascript">
          new TradingView.widget(
          {
              "autosize": true, /* Mengubah ukuran menjadi otomatis mengikuti layar */
              "symbol": "OANDA:XAUUSD", 
              "interval": "60", 
              "timezone": "Asia/Jakarta",
              "theme": "dark", 
              "style": "1", 
              "locale": "id",
              "enable_publishing": false,
              "hide_top_toolbar": false,
              "hide_side_toolbar": false,
              "allow_symbol_change": true,
              "save_image": false,
              "container_id": "tradingview_chart"
          }
          );
          </script>
        </div>
        </div>

</body>
</html>
